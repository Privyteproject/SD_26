steps:
  lint:
    image: python:3.11-slim
    commands:
      - pip install flake8 black
      - cd backend
      - black --check app
      - flake8 app

  test:
    image: python:3.11-slim
    commands:
      - pip install -r backend/requirements.txt
      - pip install pytest httpx
      - cd backend
      - pytest tests/

  security:
    image: aquasec/trivy:latest
    commands:
      - trivy fs --exit-code 1 --severity HIGH,CRITICAL .
